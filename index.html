<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Galaxy War - Ultra Sensitivity</title>
    <style>
        body { margin: 0; overflow: hidden; background: #010105; font-family: 'Arial Black', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; color: white; }
        #score-display { font-size: 30px; color: #00ffcc; text-shadow: 2px 2px #000; }
        #overlay {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: white;
        }
        button {
            padding: 20px 60px; font-size: 25px; background: #00ffcc; color: black; border: none;
            border-radius: 10px; cursor: pointer; font-weight: bold;
        }
        canvas { display: block; cursor: none; } /* Cursor oculto para focar no foguete */
    </style>
</head>
<body>

    <div id="ui">
        <div id="score-display">SCORE: 0</div>
    </div>

    <div id="overlay">
        <h1>MODO SENSIBILIDADE ALTA</h1>
        <p>O foguete agora reage instantaneamente</p>
        <button id="btn-play">INICIAR BATALHA</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreTxt = document.getElementById('score-display');
        const overlay = document.getElementById('overlay');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let gameActive = false;
        let score = 0;
        
        // Foguete com posição direta
        const player = { x: canvas.width/2, y: canvas.height/2, r: 15 };
        const shots = [];
        const enemies = [];
        const stars = Array.from({length: 150}, () => ({
            x: Math.random()*canvas.width, 
            y: Math.random()*canvas.height, 
            s: Math.random()*3
        }));

        // SENSIBILIDADE AUMENTADA: O foguete "cola" no cursor sem suavização
        window.addEventListener('mousemove', e => {
            player.x = e.clientX;
            player.y = e.clientY;
        });

        // DISPARO RÁPIDO
        const fire = () => { if(gameActive) shots.push({x: player.x, y: player.y - 20}); };
        window.addEventListener('mousedown', fire);
        window.addEventListener('keydown', e => { if(e.code === 'Space') fire(); });

        document.getElementById('btn-play').addEventListener('click', () => {
            gameActive = true;
            overlay.style.display = 'none';
            score = 0;
            enemies.length = 0;
            shots.length = 0;
            update();
            spawn();
        });

        function spawn() {
            if(!gameActive) return;
            enemies.push({
                x: Math.random() * canvas.width,
                y: -50,
                r: Math.random() * 15 + 20,
                speed: 5 + (score/500) // Meteoros mais rápidos para combinar com a sua agilidade
            });
            setTimeout(spawn, Math.max(100, 800 - (score/15)));
        }

        function update() {
            if(!gameActive) return;

            ctx.fillStyle = '#010105';
            ctx.fillRect(0,0, canvas.width, canvas.height);

            // Estrelas
            ctx.fillStyle = '#fff';
            stars.forEach(s => {
                s.y += 2; if(s.y > canvas.height) s.y = 0;
                ctx.fillRect(s.x, s.y, s.s, s.s);
            });

            // Tiros (Mais rápidos)
            shots.forEach((sh, i) => {
                sh.y -= 25; 
                ctx.fillStyle = '#0f0';
                ctx.shadowBlur = 10; ctx.shadowColor = '#0f0';
                ctx.fillRect(sh.x-2, sh.y, 4, 25);
                ctx.shadowBlur = 0;
                if(sh.y < 0) shots.splice(i, 1);
            });

            // Inimigos
            enemies.forEach((en, i) => {
                en.y += en.speed;
                ctx.fillStyle = '#855';
                ctx.beginPath(); ctx.arc(en.x, en.y, en.r, 0, Math.PI*2); ctx.fill();

                // Colisão Tiro
                shots.forEach((sh, si) => {
                    if(Math.hypot(sh.x - en.x, sh.y - en.y) < en.r) {
                        enemies.splice(i, 1);
                        shots.splice(si, 1);
                        score += 100;
                        scoreTxt.innerText = "SCORE: " + score;
                    }
                });

                // Colisão Jogador
                if(Math.hypot(player.x - en.x, player.y - en.y) < player.r + en.r) {
                    gameActive = false;
                    overlay.style.display = 'flex';
                    document.querySelector('h1').innerText = "FIM DE JOGO";
