<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Galaxy War - Auto Start Edition</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #010105; 
            font-family: 'Arial Black', sans-serif; 
            color: white; 
        }
        #ui { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            z-index: 10; 
            pointer-events: none; 
        }
        #score-display { 
            font-size: 30px; 
            color: #ffcc00; 
            text-shadow: 2px 2px 4px #000; 
        }
        #game-over-screen {
            position: absolute; 
            width: 100%; 
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            z-index: 100;
        }
        h1 { font-size: 50px; color: #ff0055; text-shadow: 0 0 10px #ff0055; margin: 0; }
        p { font-size: 20px; color: #00d4ff; }
        canvas { display: block; cursor: crosshair; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="score-display">SCORE: 0</div>
    </div>

    <div id="game-over-screen" id="go-screen">
        <h1>CONEXÃO PERDIDA</h1>
        <p>O Foguete foi destruído!</p>
        <p style="color: #fff; font-size: 16px;">Pressione F5 para Recarregar e Tentar Novamente</p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreTxt = document.getElementById('score-display');
        const gameOverScreen = document.getElementById('game-over-screen');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // O jogo já começa ativo!
        let gameActive = true;
        let score = 0;
        const player = { x: canvas.width/2, y: canvas.height/2, r: 20 };
        const shots = [];
        const enemies = [];
        const particles = [];
        const stars = [];

        // Criar estrelas de fundo
        for(let i=0; i<120; i++) {
            stars.push({
                x: Math.random() * canvas.width, 
                y: Math.random() * canvas.height, 
                s: Math.random() * 2.5
            });
        }

        // Seguir o movimento do mouse
        window.addEventListener('mousemove', e => {
            player.x = e.clientX;
            player.y = e.clientY;
        });

        // Função de Atirar
        const fire = () => { 
            if(gameActive) {
                shots.push({ x: player.x, y: player.y - 30 }); 
            }
        };

        // Atira com Clique ou Espaço
        window.addEventListener('mousedown', fire);
        window.addEventListener('keydown', e => { 
            if(e.code === 'Space') fire(); 
        });

        // Gerador contínuo de meteoros
        function spawn() {
            if(!gameActive) return;
            enemies.push({
                x: Math.random() * canvas.width,
                y: -50,
                r: Math.random() * 25 + 20, // Tamanho variado
                speed: 3 + (score / 1500)   // Fica mais rápido com o tempo
            });
            // Diminui o tempo de surgimento conforme a pontuação aumenta
            setTimeout(spawn, Math.max(250, 900 - (score / 8)));
        }

        // Efeito visual de quebra/explosão
        function explode(x, y) {
            for(let i=0; i<12; i++) {
                particles.push({
                    x, y, 
                    vx: (Math.random() - 0.5) * 12, 
                    vy: (Math.random() - 0.5) * 12, 
                    a: 1
                });
            }
        }

        function update() {
            if(!gameActive) return;

            // Fundo do espaço
            ctx.fillStyle = '#020208';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Desenhar e mover estrelas
            ctx.fillStyle = '#ffffff';
            stars.forEach(s => {
                s.y += 1.5; 
                if(s.y > canvas.height) s.y = 0;
                ctx.fillRect(s.x, s.y, s.s, s.s);
            });

            // Mover e desenhar Lasers (Armamento)
            shots.forEach((sh, i) => {
                sh.y -= 16; // Velocidade do tiro
                ctx.fillStyle = '#00ffcc';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#00ffcc';
                ctx.fillRect(sh.x - 2, sh.y, 4, 25);
                ctx.shadowBlur = 0; // Reset do brilho
                
                if(sh.y < -30) shots.splice(i, 1);
            });

            // Mover e desenhar Meteoros
