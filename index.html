<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Interstellar War - Com Login e Ranking</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #020205; 
            font-family: 'Arial Black', sans-serif; 
            color: white; 
            user-select: none;
        }
        #ui { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            z-index: 10; 
            pointer-events: none; 
            display: none; /* Oculto até o login ser feito */
        }
        .hud { 
            font-size: 24px; 
            color: #ffcc00; 
            text-shadow: 2px 2px #000;
            margin-bottom: 5px;
        }
        #planet-name { color: #00d4ff; }
        #life-bar {
            width: 200px; height: 15px;
            background: #550000; border: 2px solid #fff;
            border-radius: 10px; overflow: hidden;
        }
        #life-fill { width: 100%; height: 100%; background: #00ff00; transition: width 0.1s; }
        
        /* Telas de Menu/Login Overlay */
        #overlay {
            position: absolute; 
            width: 100%; height: 100%;
            background: rgba(2, 2, 5, 0.95);
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            z-index: 100;
        }
        h1 {
            font-size: 50px; color: #00d4ff; margin: 10px;
            text-shadow: 0 0 15px #00d4ff; text-align: center;
        }
        p { text-align: center; margin: 5px; }
        
        /* Formulário de Login */
        .login-box {
            display: flex; flex-direction: column;
            gap: 12px; margin: 20px 0; width: 280px;
        }
        .login-box input {
            padding: 12px; font-size: 16px; border: 2px solid #00d4ff;
            background: #111; color: #fff; border-radius: 8px;
            text-align: center; font-family: sans-serif;
        }
        .login-box input:focus { outline: none; box-shadow: 0 0 10px #00d4ff; }
        #login-error { color: #ff0055; font-size: 14px; font-weight: bold; min-height: 20px; }

        /* Tabela de Ranking */
        #ranking-container {
            margin-top: 15px; background: rgba(255, 255, 255, 0.05);
            padding: 15px; border-radius: 10px; border: 1px solid #333;
            width: 300px; display: none;
        }
        .ranking-table { width: 100%; border-collapse: collapse; font-family: sans-serif; }
        .ranking-table th { color: #ffcc00; border-bottom: 2px solid #ffcc00; padding: 5px; }
        .ranking-table td { padding: 6px; text-align: center; border-bottom: 1px solid #222; }
        
        button {
            padding: 15px 50px; font-size: 22px; 
            background: #ff0055; color: white; border: none;
            border-radius: 50px; cursor: pointer; font-weight: bold; 
            margin-top: 15px; box-shadow: 0 0 20px #ff0055;
            pointer-events: auto;
        }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="phase-display" class="hud">FASE: <span id="current-phase">1</span>/8</div>
        <div id="target-display" class="hud">ALVO: <span id="planet-name">Mercúrio</span></div>
        <div id="score-display" class="hud">SCORE: 0 / 20000</div>
        <div class="hud">VIDA:</div>
        <div id="life-bar"><div id="life-fill"></div></div>
    </div>

    <div id="overlay">
        <h1 id="main-title">GALAXY WAR: 8 PLANETAS</h1>
        <p id="main-desc">Entre com seu piloto e senha de 4 dígitos para decolar!</p>
        
        <div class="login-box" id="login-form">
            <input type="text" id="username" placeholder="Nome do Piloto" maxlength="12" autocomplete="off">
            <input type="password" id="password" placeholder="Senha (4 caracteres)" maxlength="4">
            <div id="login-error"></div>
        </div>

        <div id="ranking-container">
            <p style="color: #ffcc00; font-weight: bold; margin-bottom: 8px;">🏆 TOP 5 PILOTOS</p>
            <table class="ranking-table">
                <thead>
                    <tr>
                        <th>Pos</th>
                        <th>Piloto</th>
                        <th>Score Total</th>
                    </tr>
                </thead>
                <tbody id="ranking-body">
                    </tbody>
            </table>
        </div>

        <button id="btn-start">CONECTAR</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreTxt = document.getElementById('score-display');
        const phaseTxt = document.getElementById('current-phase');
        const planetTxt = document.getElementById('planet-name');
        const lifeFill = document.getElementById('life-fill');
        const overlay = document.getElementById('overlay');
        const btnStart = document.getElementById('btn-start');
        const mainTitle = document.getElementById('main-title');
        const mainDesc = document.getElementById('main-desc');
        
        // Elementos novos de Login e Ranking
        const loginForm = document.getElementById('login-form');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginError = document.getElementById('login-error');
        const rankingContainer = document.getElementById('ranking-container');
        const rankingBody = document.getElementById('ranking-body');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let gameActive = false;
        let phaseTransition = false;
        let gameWon = false; 
        let isLoggedIn = false;
        let playerSessionName = "";
        
        let currentPhase = 1;
        let score = 0;
        let totalAccumulatedScore = 0; // Guarda os pontos totais para salvar no ranking
        let loopId = null;
        let spawnTimeout = null;
        let enemyShootInterval = null;
        let starSpeed = 1;

        let ufoX = -100;
        let ufoY = canvas.height / 2;
        let ufoAngle = 0;

        const planetList = [
            { name: "Mercúrio", color1: "#8c8c8c", color2: "#595959", color3: "#262626" },
            { name: "Vênus",    color1: "#e39b5d", color2: "#bf6a2a", color3: "#592b0c" },
            { name: "Terra",    color1: "#2b82c9", color2: "#195383", color3: "#0b243a" },
            { name: "Marte",    color1: "#ff7755", color2: "#cc4422", color3: "#441105" },
            { name: "Júpiter",  color1: "#d4a373", color2: "#a66c38", color3: "#452810" },
            { name: "Saturno",  color1: "#f4e2bb", color2: "#c5a059", color3: "#544322", hasRings: true },
            { name: "Urano",    color1: "#70d6ff", color2: "#4ea8de", color3: "#1d4e89" },
            { name: "Netuno",   color1: "#48cae4", color2: "#0077b6", color3: "#023e8a" }
        ];

        const player = { x: canvas.width/2, y: canvas.height/2, r: 20, hp: 100 };
        const activePlanet = { x: canvas.width / 2, y: -350, r: 250, targetY: -50 };
        
        let playerShots = [];
        let enemyShots = [];
        let enemies = [];
        let particles = [];
        const stars = [];

        for(let i=0; i<80; i++) {
            stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2});
        }

        window.addEventListener('mousemove', e => {
            if (gameActive && !phaseTransition && !gameWon) {
                player.x = e.clientX;
                player.y = e.clientY;
            }
        });

        function playerFire() {
            if(gameActive && !phaseTransition && !gameWon) playerShots.push({x: player.x, y: player.y - 30});
        }

        window.addEventListener('mousedown', () => { 
            if(gameActive) playerFire(); 
        });
        
        window.addEventListener('keydown', e => {
            if(e.code === 'Space') {
                e.preventDefault();
                if(gameActive) playerFire();
            }
        });

        // Botão Único que Gerencia Login e depois os Reinícios do Jogo
        btnStart.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();

            if (!isLoggedIn) {
                let user = usernameInput.value.trim();
                let pass = passwordInput.value;

                if (user.length < 2) {
                    loginError.innerText = "Nome precisa de ao menos 2 letras.";
                    return;
                }
                if (pass.length !== 4) {
                    loginError.innerText = "A senha DEVE ter exatamente 4 caracteres.";
                    return;
                }

                // Login efetuado com sucesso
                isLoggedIn = true;
                playerSessionName = user;
                loginForm.style.display = 'none';
                document.getElementById('ui').style.display = 'block';
                btnStart.innerText = "DECOLAR";
                mainDesc.innerText = `Piloto ${playerSessionName} autenticado. Pronto para o combate!`;
                return;
            }

            // Se já estiver logado, o botão serve para rodar o game
            initGame(true); 
        });

        function initGame(resetAll = true) {
            cancelAnimationFrame(loopId);
            clearTimeout(spawnTimeout);
            clearInterval(enemyShootInterval);
            
            gameActive = true;
            phaseTransition = false;
            gameWon = false;
            starSpeed = 1;
            score = 0;
            player.hp = 100;
            player.x = canvas.width / 2;
            player.y = canvas.height - 150;
            activePlanet.y = -350;
            ufoX = -100;

            if (resetAll) {
                currentPhase = 1;
                totalAccumulatedScore = 0;
            }

            phaseTxt.innerText = currentPhase;
            planetTxt.innerText = planetList[currentPhase - 1].name;
            
            enemies = [];
            playerShots = [];
            enemyShots = [];
            particles = [];
            
            overlay.style.display = 'none';
            rankingContainer.style.display = 'none';
            scoreTxt.innerText = "SCORE: 0 / 20000";
            lifeFill.style.width = "100%";
            lifeFill.style.background = "#00ff00";
            
            update();
            spawn();
            
            enemyShootInterval = setInterval(() => {
                if(!gameActive || phaseTransition || gameWon) return;
                enemies.forEach(en => {
                    if(en.y > 0 && en.y < canvas.height) {
                        enemyShots.push({x: en.x, y: en.y + en.r, speed: 6 + currentPhase*0.5});
                    }
                });
            }, Math.max(500, 1200 - currentPhase * 80));
        }

        function nextPhaseAutomated() {
            phaseTransition = false;
            starSpeed = 1;
            score = 0;
            player.hp = Math.min(100, player.hp + 30); 
            player.y = canvas.height - 150;
            activePlanet.y = -350;
            
            enemies = [];
            playerShots = [];
            enemyShots = [];
            
            phaseTxt.innerText = currentPhase;
            planetTxt.innerText = planetList[currentPhase - 1].name;
            scoreTxt.innerText = "SCORE: 0 / 20000";
            
            spawn();
        }

        function spawn() {
            if(!gameActive || phaseTransition || gameWon) return;
            enemies.push({
                x: Math.random() * canvas.width,
                y: -50,
                r: 22,
                speed: 2.5 + currentPhase * 0.4
            });
            spawnTimeout = setTimeout(spawn, Math.max(200, 1100 - (score/150)));
        }

        function explode(x, y, color) {
            for(let i=0; i<10; i++) {
                particles.push({
                    x, y, 
                    vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12, 
                    a: 1, c: color
                });
            }
        }

        function update() {
            if(!gameActive) return;

            ctx.fillStyle = '#020205';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = 'white';
            stars.forEach(s => {
                s.y += starSpeed; 
                if(s.y > canvas.height) s.y = 0;
                ctx.fillRect(s.x, s.y, s.s, s.s);
            });

            if (score >= 20000 && !phaseTransition) {
                phaseTransition = true;
                enemies = []; 
                enemyShots = [];
                starSpeed = 20; 
            }

            if (phaseTransition && !gameWon) {
                if (activePlanet.y < activePlanet.targetY) {
                    activePlanet.y += 3;
                } else {
                    starSpeed = Math.max(0.2, starSpeed - 0.4);
                    player.x += (activePlanet.x - player.x) * 0.05;
                    player.y += ((activePlanet.y + 90) - player.y) * 0.05;

                    if (Math.abs(player.y - (activePlanet.y + 90)) < 6) {
                        if (currentPhase < 8) {
                            currentPhase++;
                            nextPhaseAutomated(); 
                        } else {
                            triggerGameWin();
                        }
                    }
                }

                let pData = planetList[currentPhase - 1];
                let gradient = ctx.createRadialGradient(activePlanet.x - 50, activePlanet.y - 50, 10, activePlanet.x, activePlanet.y, activePlanet.r);
                gradient.addColorStop(0, pData.color1);
                gradient.addColorStop(0.6, pData.color2);
                gradient.addColorStop(1, pData.color3);
                
                if (pData.hasRings) {
                    ctx.strokeStyle = "rgba(197, 160, 89, 0.5)";
                    ctx.lineWidth = 15;
                    ctx.save(); ctx.translate(activePlanet.x, activePlanet.y);
                    ctx.scale(2, 0.4); ctx.beginPath();
                    ctx.arc(0, 0, activePlanet.r - 20, 0, Math.PI * 2);
                    ctx.stroke(); ctx.restore();
                }

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(activePlanet.x, activePlanet.y, activePlanet.r, 0, Math.PI * 2);
                ctx.fill();
            }

            if (gameWon) {
                starSpeed = 0.5;
                let terraX = canvas.width / 2;
                let terraY = 200;
                let terraGradient = ctx.createRadialGradient(terraX - 30, terraY - 30, 5, terraX, terraY, 120);
                terraGradient.addColorStop(0, "#2b82c9");
                terraGradient.addColorStop(0.6, "#195383");
                terraGradient.addColorStop(1, "#050f1a");
                
                ctx.fillStyle = terraGradient;
                ctx.beginPath(); ctx.arc(terraX, terraY, 120, 0, Math.PI * 2); ctx.fill();

                ctx.fillStyle = "rgba(34, 139, 34, 0.7)";
                ctx.beginPath(); ctx.arc(terraX - 40, terraY - 20, 35, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(terraX + 20, terraY + 30, 40, 0, Math.PI*2); ctx.fill();

                ufoX += 3;
                ufoY = (canvas.height / 2) + Math.sin(ufoAngle) * 80;
                ufoAngle += 0.03;

                ctx.fillStyle = "rgba(0, 255, 255, 0.8)";
                ctx.beginPath(); ctx.arc(ufoX, ufoY - 10, 20, Math.PI, 0); ctx.fill();

                let ufoGrad = ctx.createLinearGradient(ufoX - 50, ufoY, ufoX + 50, ufoY);
                ufoGrad.addColorStop(0, "#555"); ufoGrad.addColorStop(0.5, "#aaa"); ufoGrad.addColorStop(1, "#555");
                ctx.fillStyle = ufoGrad;
                ctx.beginPath(); ctx.ellipse(ufoX, ufoY, 50, 15, 0, 0, Math.PI * 2); ctx.fill();

                for (let l = -35; l <= 35; l += 14) {
                    ctx.fillStyle = (Math.floor(Date.now() / 150) + l) % 2 === 0 ? "#ff0055" : "#00ff00";
                    ctx.beginPath(); ctx.arc(ufoX + l, ufoY + 2, 4, 0, Math.PI * 2); ctx.fill();
                }

                if (ufoX > canvas.width + 100) ufoX = -100;
            }

            if (!gameWon) {
                playerShots.forEach((sh, i) => {
                    sh.y -= 15;
                    ctx.fillStyle = '#00ff00';
                    ctx.fillRect(sh.x-2, sh.y, 4, 20);
                    if(sh.y < -20) playerShots.splice(i, 1);
                });

                enemyShots.forEach((esh, i) => {
                    esh.y += esh.speed;
                    ctx.fillStyle = '#ffff00';
                    ctx.fillRect(esh.x-2, esh.y, 4, 15);

                    if(Math.hypot(esh.x - player.x, esh.y - player.y) < player.r) {
                        enemyShots.splice(i, 1);
                        player.hp -= 12;
                        explode(player.x, player.y, '#ff0055');
                        if(player.hp <= 0) gameOver();
                    }
                    if(esh.y > canvas.height + 20) enemyShots.splice(i, 1);
                });

                if (!phaseTransition) {
                    enemies.forEach((en, i) => {
                        en.y += en.speed;
                        ctx.fillStyle = '#ff3333';
                        ctx.beginPath();
                        ctx.moveTo(en.x, en.y + en.r);
                        ctx.lineTo(en.x - en.r, en.y - en.r);
                        ctx.lineTo(en.x + en.r, en.y - en.r);
                        ctx.fill();

                        playerShots.forEach((sh, si) => {
                            if(Math.hypot(sh.x - en.x, sh.y - en.y) < en.r) {
                                explode(en.x, en.y, '#ff5500');
                                enemies.splice(i, 1);
                                playerShots.splice(si, 1);
                                score += 250; 
                                totalAccumulatedScore += 250;
                                scoreTxt.innerText = "SCORE: " + score + " / 20000";
                            }
                        });

                        if(Math.hypot(player.x - en.x, player.y - en.y) < player.r + en.r) {
                            player.hp -= 25;
                            explode(en.x, en.y, '#ff0000');
                            enemies.splice(i, 1);
                            if(player.hp <= 0) gameOver();
                        }
                        if(en.y > canvas.height + 50) enemies.splice(i, 1);
                    });
                }

                lifeFill.style.width = Math.max(0, player.hp) + "%";
                if(player.hp < 40) lifeFill.style.background = "#ff0000";
                drawRocket(player.x, player.y);
            }

            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.a -= 0.03;
                ctx.fillStyle = p.c; ctx.globalAlpha = p.a;
                ctx.fillRect(p.x, p.y, 3, 3); ctx.globalAlpha = 1;
                if(p.a <= 0) particles.splice(i, 1);
            });

            loopId = requestAnimationFrame(update);
        }

        function drawRocket(x, y) {
            ctx.fillStyle = '#ff0055'; 
            ctx.fillRect(x-20, y, 8, 15); ctx.fillRect(x+12, y, 8, 15);
            ctx.fillStyle = '#ffffff';
            ctx.beginPath(); ctx.moveTo(x, y-30); ctx.lineTo(x+12, y+10); ctx.lineTo(x-12, y+10); ctx.fill();
            ctx.fillStyle = '#ffaa00'; 
            if(Math.random()>0.4) ctx.fillRect(x-4, y+10, 8, 12);
        }

        // LÓGICA DE RANKING (Salva localmente no navegador)
        function saveAndShowRanking() {
            let leaderboard = JSON.parse(localStorage.getItem('galaxy_ranking')) || [];
            
            // Adiciona a pontuação atual do jogador
            leaderboard.push({ name: playerSessionName, score: totalAccumulatedScore });
            
            // Ordena do maior para o menor e pega o Top 5
            leaderboard.sort((a, b) => b.score - a.score);
            leaderboard = leaderboard.slice(0, 5);
            
            localStorage.setItem('galaxy_ranking', JSON.stringify(leaderboard));

            // Renderiza na tabela HTML
            rankingBody.innerHTML = "";
            leaderboard.forEach((item, index) => {
                rankingBody.innerHTML += `
                    <tr>
                        <td>${index + 1}º</td>
                        <td>${item.name}</td>
                        <td>${item.score} pts</td>
                    </tr>
                `;
            });

            rankingContainer.style.display = 'block';
        }

        function gameOver() {
            gameActive = false;
            clearInterval(enemyShootInterval);
            overlay.style.display = 'flex';
            mainTitle.innerText = "MISSÃO COMPROMETIDA";
            mainTitle.style.color = "#ff0055";
            mainDesc.innerText = `Piloto ${playerSessionName} caiu defendendo a órbita de ${planetList[currentPhase-1].name}.`;
            btnStart.innerText = "RECOMEÇAR JORNADA";
            saveAndShowRanking();
        }

        function triggerGameWin() {
            clearInterval(enemyShootInterval);
            gameWon = true; 
            overlay.style.display = 'flex';
            mainTitle.innerText = "SISTEMA SOLAR SALVO!";
            mainTitle.style.color = "#ffcc00";
            mainDesc.innerText = `Incrível, Piloto ${playerSessionName}! O OVNI misterioso ruma em paz de volta à Terra!`;
            btnStart.innerText = "JOGAR NOVAMENTE";
            saveAndShowRanking();
        }

        window.onresize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            activePlanet.x = canvas.width / 2;
        };
    </script>
</body>
</html>
