<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Galaxy War - Tactical Waves</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #020205; 
            font-family: 'Arial Black', sans-serif; 
            color: white; 
            user-select: none;
        }
        #ui { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            z-index: 10; 
            pointer-events: none; 
            display: flex;
            gap: 30px;
        }
        .hud { 
            font-size: 25px; 
            text-shadow: 2px 2px #000; 
        }
        #wave-display { color: #00d4ff; }
        #lives-display { color: #ff0055; }
        #score-display { color: #ffcc00; }
        
        #overlay {
            position: absolute; 
            width: 100%; 
            height: 100%;
            background: radial-gradient(circle, rgba(20,20,50,0.95) 0%, rgba(0,0,0,1) 100%);
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            z-index: 100;
            cursor: pointer;
        }
        h1 {
            font-size: 50px;
            color: #00d4ff;
            margin: 10px;
            text-shadow: 0 0 15px #00d4ff;
        }
        button {
            padding: 20px 60px; 
            font-size: 25px; 
            background: #ff0055; 
            color: white; 
            border: none;
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 20px;
            box-shadow: 0 0 20px #ff0055;
        }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="hud" id="wave-display">FASE: 1</div>
        <div class="hud" id="lives-display">VIDAS: ❤️❤️❤️</div>
        <div class="hud" id="score-display">SCORE: 0</div>
    </div>

    <div id="overlay" onclick="startGame()">
        <h1 id="main-title">GALAXY WAR</h1>
        <p id="main-desc">ELIMINE TODOS OS METEOROS PARA AVANÇAR</p>
        <p style="color: #ffaa00; font-size: 14px;">Cuidado: Os meteoros agora respondem e atiram de volta!</p>
        <button id="btn-text">DECOLAR</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const waveTxt = document.getElementById('wave-display');
        const livesTxt = document.getElementById('lives-display');
        const scoreTxt = document.getElementById('score-display');
        const overlay = document.getElementById('overlay');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let gameActive = false;
        let score = 0;
        let currentWave = 1;
        let lives = 3;
        let loopId = null;

        const player = { x: canvas.width/2, y: canvas.height/2, r: 18 };
        let playerShots = [];
        let enemyShots = [];
        let enemies = [];
        let particles = [];
        const stars = [];

        // Estrelas estáticas de fundo
        for(let i=0; i<100; i++) {
            stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2});
        }

        window.addEventListener('mousemove', e => {
            player.x = e.clientX;
            player.y = e.clientY;
        });

        // Mecânica de tiro do jogador
        function playerFire() {
            if(gameActive) playerShots.push({x: player.x, y: player.y - 30});
        }
        window.addEventListener('mousedown', playerFire);
        window.addEventListener('keydown', e => { 
            if(e.code === 'Space') { e.preventDefault(); if(!gameActive) startGame(); else playerFire(); }
        });

        function startGame() {
            if (gameActive) return;
            cancelAnimationFrame(loopId);
            
            gameActive = true;
            overlay.style.display = 'none';
            score = 0;
            currentWave = 1;
            lives = 3;
            playerShots = [];
            enemyShots = [];
            particles = [];
            
            updateHUD();
            generateWave();
            update();
        }

        // Gera os meteoros exatos do nível atual
        function generateWave() {
            enemies = [];
            // Fase 1 = 5 meteoros. Fase 2 = 8, Fase 3 = 11, etc.
            const totalMeteoros = 5 + (currentWave - 1) * 3; 
            
            for(let i = 0; i < totalMeteoros; i++) {
                enemies.push({
                    x: Math.random() * (canvas.width - 60) + 30,
                    y: Math.random() * -400 - 50, // Nascem acima da tela em tempos diferentes
                    r: Math.random() * 15 + 20,
                    speedY: Math.random() * 1.5 + 2,
                    speedX: (Math.random() - 0.5) * 2, // Movimento diagonal leve
                    lastShot: Date.now() + Math.random() * 2000 // Delay pro primeiro tiro recarregar
                });
            }
            updateHUD();
        }

        function updateHUD() {
            waveTxt.innerText = "FASE: " + currentWave;
            scoreTxt.innerText = "SCORE: " + score;
            livesTxt.innerText = "VIDAS: " + "❤️".repeat(lives);
        }

        function explode(x, y) {
            for(let i=0; i<8; i++) {
                particles.push({
                    x, y, 
                    vx: (Math.random()-0.5)*10, 
                    vy: (Math.random()-0.5)*10, 
                    a: 1
                });
            }
        }

        function update() {
            if(!gameActive) return;

            ctx.fillStyle = '#020205';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Cenário Estrelas
            ctx.fillStyle = 'white';
            stars.forEach(s => {
                s.y += 1; if(s.y > canvas.height) s.y = 0;
                ctx.fillRect(s.x, s.y, s.s, s.s);
            });

            // Tiros do Jogador
            playerShots.forEach((sh, i) => {
                sh.y -= 14;
                ctx.fillStyle = '#00ff00';
                ctx.fillRect(sh.x-2, sh.y, 4, 20);
                if(sh.y < -20) playerShots.splice(i, 1);
            });

            // Tiros dos Meteoros (Inimigos)
            enemyShots.forEach((esh, i) => {
                esh.y += 7; // Velocidade do tiro do meteoro
                ctx.fillStyle = '#ff3300';
                ctx.fillRect(esh.x-3, esh.y, 6, 15);

                // Colisão: Tiro inimigo atingiu o jogador
                if(Math.hypot(esh.x - player.x, esh.y - player.y) < player.r) {
                    enemyShots.splice(i, 1);
                    damagePlayer();
                }

                if(esh.y > canvas.height + 20) enemyShots.splice(i, 1);
            });
