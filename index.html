<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Racing Survival - 5 Fases</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="hud">
        <div class="player-stats">
            <span style="color: #ff4757">P1 HP: <b id="hp1">100</b>%</span> | 
            <span>Score: <b id="score1">0</b></span>
        </div>
        <div id="fase-info">
            <h2 id="nomeFase">FASE 1</h2>
            <p id="msg">Chegue ao final!</p>
        </div>
        <div class="player-stats">
            <span style="color: #1e90ff">P2 HP: <b id="hp2">100</b>%</span> | 
            <span>Score: <b id="score2">0</b></span>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <script src="script.js"></script>
</body>
</html>
