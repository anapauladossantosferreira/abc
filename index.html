<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Galaxy War: 5 Stages</title>
    <style>
        body { margin: 0; overflow: hidden; background: #020205; font-family: 'Arial Black', sans-serif; color: white; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        .hud { font-size: 25px; text-shadow: 2px 2px #000; margin-bottom: 5px; }
        #score-display { color: #ffcc00; }
        #stage-display { color: #00d4ff; }
        #overlay {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(20,20,50,0.9) 0%, rgba(0,0,0,1) 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
        button {
            padding: 20px 60px; font-size: 25px; background: #00d4ff; color: black; border: none;
            border-radius: 50px; cursor: pointer; font-weight: bold; margin-top: 20px;
        }
        canvas { display: block; cursor: crosshair; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="hud">FASE: <span id="stage-display">1</span>/5</div>
        <div class="hud">SCORE: <span id="score-display">0</span></div>
    </div>

    <div id="overlay">
        <h1 id="main-title">GALAXY WAR</h1>
        <p id="sub-title">Os inimigos agora atiram! Um acerto avança de fase.</p>
        <button id="btn-play">INICIAR BATALHA</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreTxt = document.getElementById('score-display');
        const stageTxt = document.getElementById('stage-display');
        const overlay = document.getElementById('overlay');
        const mainTitle = document.getElementById('main-title');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let gameActive = false;
        let score = 0;
        let stage = 1;
        const player = { x: canvas.width/2, y: canvas.height/2, r: 18 };
        
        const myShots = [];
        const enemyShots = [];
        const enemies = [];
        const particles = [];
        const stars = [];

        // Estrelas de fundo
        for(let i=0; i<100; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2});

        // Controles
        window.addEventListener('mousemove', e => {
            player.x = e.clientX;
            player.y = e.clientY;
        });

        // Disparo do Jogador
        const fire = () => { if(gameActive) myShots.push({x: player.x, y: player.y - 30}); };
        window.addEventListener('mousedown', fire);
        window.addEventListener('keydown', e => { if(e.code === 'Space') fire(); });

        document.getElementById('btn-play').addEventListener('click', () => {
            gameActive = true;
            overlay.style.display = 'none';
            score = 0;
            stage = 1;
            enemies.length = 0;
            myShots.length = 0;
            enemyShots.length = 0;
            scoreTxt.innerText = "0";
            stageTxt.innerText = "1";
            update();
            spawn();
        });

        function spawn() {
            if(!gameActive) return;
            
            // Quanto maior a fase, mais rápido eles aparecem e caem
            enemies.push({
                x: Math.random() * canvas.width,
                y: -50,
                r: Math.random() * 20 + 20,
                speed: 2 + stage,
                lastShot: Date.now(),
                shootInterval: Math.max(800, 2500 - (stage * 400)) // Atiram com mais frequência a cada fase
            });
            
            setTimeout(spawn, Math.max(300, 1200 - (stage * 150)));
        }

        function explode(x, y, color) {
            for(let i=0; i<10; i++) {
                particles.push({
                    x, y, 
                    vx: (Math.random()-0.5)*12, 
                    vy: (Math.random()-0.5)*12, 
                    a: 1,
                    color: color
                });
            }
        }

        function update() {
            if(!gameActive) return;

            ctx.fillStyle = '#020205';
            ctx.fillRect(0,0, canvas.width, canvas.height);

            // Estrelas
            ctx.fillStyle = 'white';
            stars.forEach(s => {
                s.y += 0.5 + (stage * 0.5); 
                if(s.y > canvas.height) s.y = 0;
                ctx.fillRect(s.x, s.y, s.s, s.s);
            });

            // Movimentar Tiros do Jogador (Verde)
            myShots.forEach((sh, i) => {
                sh.y -= 16;
                ctx.fillStyle = '#0f0';
                ctx.fillRect(sh.x-2, sh.y, 4, 20);
                if(sh.y < 0) myShots.splice(i, 1);
            });

            // Movimentar Tiros dos Inimigos (Vermelho)
            enemyShots.forEach((esh, i) => {
                esh.y += 8 + stage; // Tiros ficam mais rápidos por fase
                ctx.fillStyle = '#f00';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#f00';
                ctx.fillRect(esh.x-3, esh.y, 6, 18);
                ctx.shadowBlur = 0;

                // Testar se o tiro inimigo acertou você
                if(Math.hypot(esh.x - player.x, esh.y - player.y) < player.r) {
                    explode(player.x, player.y, '#f22');
                    gameOver("SUA NAVE FOI DESTRUÍDA!");
                }

                if(esh.y > canvas.height) enemyShots.splice(i, 1);
            });

            // Movimentar Meteoros Inimigos
            enemies.forEach((en, i) => {
                en.y += en.speed;
                ctx.fillStyle = '#766';
                ctx.beginPath(); ctx.arc(en.x, en.y, en.r, 0, Math.PI*2); ctx.fill();

                // Lógica de Tiro do Inimigo
                if(Date.now() - en.lastShot > en.shootInterval) {
                    enemyShots.push({ x: en.x, y: en.y + en.r });
                    en.lastShot = Date.now();
                }

                // Colisão do seu Tiro com o Inimigo
                myShots.forEach((sh, si) => {
                    const d = Math.hypot(sh.x - en.x, sh.y - en.y);
                    if(d < en.r) {
                        explode(en.x, en.y, '#f72');
                        enemies.splice(i, 1);
                        myShots.splice(si, 1);
                        
                        score += 100 * stage;
                        scoreTxt.innerText = score;

                        // Passar de fase a cada acerto
                        if(stage < 5) {
                            stage++;
                            stageTxt.innerText = stage;
                        } else {
                            gameOver("VITÓRIA CONQUISTADA! VOCÊ SALVOU A GALÁXIA!");
                        }
                    }
                });

                // Colisão física direta (Meteoro bateu no Foguete)
                if(Math.hypot(player.x - en.x, player.y - en.y) < player.r + en.r) {
                    explode(player.x, player.y, '#f55');
                    gameOver("COLISÃO CRÍTICA! GAME OVER");
                }

                if(en.y > canvas.height + 50) enemies.splice(i, 1);
            });

            // Partículas de explosões
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.
