<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Galaxy War - Missão Marte (Fixed)</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #020205; 
            font-family: 'Arial Black', sans-serif; 
            color: white; 
            user-select: none;
        }
        #ui { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            z-index: 10; 
            pointer-events: none; 
        }
        .hud { 
            font-size: 24px; 
            color: #ffcc00; 
            text-shadow: 2px 2px #000;
            margin-bottom: 5px;
        }
        #life-bar {
            width: 200px;
            height: 15px;
            background: #550000;
            border: 2px solid #fff;
            border-radius: 10px;
            overflow: hidden;
        }
        #life-fill {
            width: 100%;
            height: 100%;
            background: #00ff00;
            transition: width 0.1s;
        }
        #overlay {
            position: absolute; 
            width: 100%; 
            height: 100%;
            background: rgba(2, 2, 5, 0.9);
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            z-index: 100;
        }
        h1 {
            font-size: 50px;
            color: #00d4ff;
            margin: 10px;
            text-shadow: 0 0 15px #00d4ff;
            text-align: center;
        }
        p { text-align: center; margin: 5px; pointer-events: none; }
        button {
            padding: 20px 60px; 
            font-size: 25px; 
            background: #ff0055; 
            color: white; 
            border: none;
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 20px;
            box-shadow: 0 0 20px #ff0055;
        }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="score-display" class="hud">SCORE: 0 / 40000</div>
        <div class="hud">VIDA:</div>
        <div id="life-bar"><div id="life-fill"></div></div>
    </div>

    <div id="overlay">
        <h1 id="main-title">GALAXY WAR: MISSÃO MARTE</h1>
        <p id="main-desc">Destrua os inimigos e alcance a órbita de Marte!</p>
        <p style="color: #00ff00; font-size: 14px;">Mova o Mouse | Clique ou Espaço: Atira</p>
        <button id="btn-start">DECOLAR</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreTxt = document.getElementById('score-display');
        const lifeFill = document.getElementById('life-fill');
        const overlay = document.getElementById('overlay');
        const btnStart = document.getElementById('btn-start');
        const mainTitle = document.getElementById('main-title');
        const mainDesc = document.getElementById('main-desc');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let gameActive = false;
        let gameWon = false;
        let score = 0;
        let loopId = null;
        let spawnTimeout = null;
        let enemyShootInterval = null;
        let starSpeed = 1;

        const player = { x: canvas.width/2, y: canvas.height/2, r: 20, hp: 100 };
        const mars = { x: canvas.width / 2, y: -300, r: 250, targetY: -50 };
        
        let playerShots = [];
        let enemyShots = [];
        let enemies = [];
        let particles = [];
        const stars = [];

        for(let i=0; i<80; i++) {
            stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2});
        }

        window.addEventListener('mousemove', e => {
            if (gameActive && !gameWon) {
                player.x = e.clientX;
                player.y = e.clientY;
            }
        });

        function playerFire() {
            if(gameActive && !gameWon) playerShots.push({x: player.x, y: player.y - 30});
        }

        // Se o jogo NÃO estiver ativo, qualquer clique na janela força o início do jogo
        window.addEventListener('mousedown', () => { 
            if(gameActive) {
                playerFire(); 
            } else {
                initGame();
            }
        });
        
        window.addEventListener('keydown', e => {
            if(e.code === 'Space') {
                e.preventDefault();
                if(gameActive) {
                    playerFire();
                } else {
                    initGame();
                }
            }
            if(e.code === 'Enter' && !gameActive) {
                initGame();
            }
        });

        // Clique direto no botão também mapeado
        btnStart.addEventListener('click', (e) => {
            e.stopPropagation();
            initGame();
        });

        function initGame() {
            if (gameActive) return;
            
            cancelAnimationFrame(loopId);
            clearTimeout(spawnTimeout);
            clearInterval(enemyShootInterval);
            
            gameActive = true;
            gameWon = false;
            starSpeed = 1;
            score = 0;
            player.hp = 100;
            player.x = canvas.width / 2;
            player.y = canvas.height - 150;
            mars.y = -300;
            
            enemies = [];
            playerShots = [];
            enemyShots = [];
            particles = [];
            
            overlay.style.display = 'none';
            scoreTxt.innerText = "SCORE: 0 / 40000";
            lifeFill.style.width = "100%";
            lifeFill.style.background = "#00ff00";
            
            update();
            spawn();
            
            enemyShootInterval = setInterval(() => {
                if(!gameActive || gameWon) return;
                enemies.forEach(en => {
                    if(en.y > 0 && en.y < canvas.height) {
                        enemyShots.push({x: en.x, y: en.y + en.r, speed: 7});
                    }
                });
            }, 1100);
        }

        function spawn() {
            if(!gameActive || gameWon) return;
            enemies.push({
                x: Math.random() * canvas.width,
                y: -50,
                r: 22,
                speed: 2.5 + (score/3000)
            });
            spawnTimeout = setTimeout(spawn, Math.max(250, 1100 - (score/10)));
        }

        function explode(x, y, color) {
            for(let i=0; i<10; i++) {
                particles.push({
                    x, y, 
                    vx: (Math.random()-0.5)*12, 
                    vy: (Math.random()-0.5)*12, 
                    a: 1,
                    c: color
                });
            }
        }

        function update() {
            if(!gameActive) return;

            ctx.fillStyle = '#020205';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = 'white';
            stars.forEach(s => {
                s.y += starSpeed; 
                if(s.y > canvas.height) s.y = 0;
                ctx.fillRect(s.x, s.y, s.s, s.s);
            });

            if (score >= 40000 && !gameWon) {
                gameWon = true;
                enemies = []; 
                enemyShots = [];
                starSpeed = 15; 
            }

            if (gameWon) {
                if (mars.y < mars.targetY) {
                    mars.y += 2;
                } else {
                    starSpeed = Math.max(0.2, starSpeed - 0.2);
                    player.x += (mars.x - player.x) * 0.05;
                    player.y += ((mars.y + 100) - player.y) * 0.05;

                    if (Math.abs(player.y - (mars.y + 100)) < 5) {
                        triggerWinScreen();
                        return;
                    }
                }

                let gradient = ctx.createRadialGradient(mars.x - 50, mars.y - 50, 10, mars.x, mars.y, mars.r);
                gradient.addColorStop(0, '#ff7755');
                gradient.addColorStop(0.6, '#cc4422');
                gradient.addColorStop(1, '#441105');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(mars.x, mars.y, mars.r, 0, Math.PI * 2);
                ctx.fill();
            }

            playerShots.forEach((sh, i) => {
                sh.y -= 15;
                ctx.fillStyle = '#00ff00';
                ctx.fillRect(sh.x-2, sh.y, 4, 20);
                if(sh.y < -20) playerShots.splice(i, 1);
            });

            enemyShots.forEach((esh, i) => {
                esh.y += esh.speed;
                ctx.fillStyle = '#ffff00';
                ctx.fillRect(esh.x-2, esh.y, 4, 15);

                if(Math.hypot(esh.x - player.x, esh.y - player.y) < player.r) {
                    enemyShots.splice(i, 1);
                    player.hp -= 15;
                    explode(player.x, player.y, '#ff0055');
                    if(player.hp <= 0) gameOver();
                }
                if(esh.y > canvas.height + 20) enemyShots.splice(i, 1);
            });

            if (!gameWon) {
                enemies.forEach((en, i) => {
                    en.y += en.speed;
                    
                    ctx.fillStyle = '#ff3333';
                    ctx.beginPath();
                    ctx.moveTo(en.x, en.y + en.r);
                    ctx.lineTo(en.x - en.r, en.y - en.r);
                    ctx.lineTo(en.x + en.r, en.y - en.r);
                    ctx.fill();

                    playerShots.forEach((sh, si) => {
                        if(Math.hypot(sh.x - en.x, sh.y - en.y) < en.r) {
                            explode(en.x, en.y, '#ff5500');
                            enemies.splice(i, 1);
                            playerShots.splice(si, 1);
                            score += 1000; 
                            scoreTxt.innerText = "SCORE: " + score + " / 40000";
                        }
                    });

                    if(Math.hypot(player.x - en.x, player.y - en.y) < player.r + en.r) {
                        player.hp -= 30;
                        explode(en.x, en.y, '#ff0000');
                        enemies.splice(i, 1);
                        if(player.hp <= 0) gameOver();
                    }
                    if(en.y > canvas.height + 50) enemies.splice(i, 1);
                });
            }

            lifeFill.style.width = Math.max(0, player.hp) + "%";
            if(player.hp < 40) lifeFill.style.background = "#ff0000";

            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.a -= 0.03;
                ctx.fillStyle = p.c;
                ctx.globalAlpha = p.a;
                ctx.fillRect(p.x, p.y, 3, 3);
                ctx.globalAlpha = 1;
                if(p.a <= 0) particles.splice(i, 1);
            });

            drawRocket(player.x, player.y);
            loopId = requestAnimationFrame(update);
        }

        function drawRocket(x, y) {
            ctx.fillStyle = '#ff0055'; 
            ctx.fillRect(x-20, y, 8, 15); ctx.fillRect(x+12, y, 8, 15);
            ctx.fillStyle = '#ffffff'; 
            ctx.beginPath(); ctx.moveTo(x, y-30); ctx.lineTo(x+12, y+10); ctx.lineTo(x-12, y+10); ctx.fill();
            ctx.fillStyle = '#ffaa00'; 
            if(Math.random()>0.4) ctx.fillRect(x-4, y+10, 8, 12);
        }

        function gameOver() {
            gameActive = false;
            clearInterval(enemyShootInterval);
            overlay.style.display = 'flex';
            mainTitle.innerText = "MISSÃO ABORTADA";
            mainTitle.style.color = "#ff0055";
            mainDesc.innerText = "Seu foguete foi destruído antes de chegar a Marte.";
            btnStart.innerText = "RECOMENÇAR";
        }

        function triggerWinScreen() {
            gameActive = false;
            clearInterval(enemyShootInterval);
            overlay.style.display = 'flex';
            mainTitle.innerText = "MISSÃO CUMPRIDA!";
            mainTitle.style.color = "#00ff00";
            mainDesc.innerText = "Parabéns! Você alcançou Marte com sucesso!";
            btnStart.innerText = "REJOGAR MISSÃO";
        }

        window.onresize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            mars.x = canvas.width / 2;
        };
    </script>
</body>
</html>
