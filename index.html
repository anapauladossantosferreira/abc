<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Space Galaxy Laser War</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #020205; 
            font-family: 'Arial Black', sans-serif; 
            color: white; 
            user-select: none;
        }
        #ui { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            z-index: 10; 
            pointer-events: none; 
        }
        .hud { 
            font-size: 24px; 
            color: #ffcc00; 
            text-shadow: 2px 2px #000;
            margin-bottom: 5px;
        }
        #life-bar {
            width: 200px;
            height: 15px;
            background: #550000;
            border: 2px solid #fff;
            border-radius: 10px;
            overflow: hidden;
        }
        #life-fill {
            width: 100%;
            height: 100%;
            background: #00ff00;
            transition: width 0.1s;
        }
        #overlay {
            position: absolute; 
            width: 100%; 
            height: 100%;
            background: radial-gradient(circle, rgba(20,20,50,0.95) 0%, rgba(0,0,0,1) 100%);
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            z-index: 100;
        }
        h1 {
            font-size: 50px;
            color: #00d4ff;
            margin: 10px;
            text-shadow: 0 0 15px #00d4ff;
        }
        button {
            padding: 20px 60px; 
            font-size: 25px; 
            background: #ff0055; 
            color: white; 
            border: none;
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 20px;
            box-shadow: 0 0 20px #ff0055;
        }
        button:hover {
            transform: scale(1.05);
            background: #ff2b73;
        }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="score-display" class="hud">SCORE: 0</div>
        <div class="hud">VIDA:</div>
        <div id="life-bar"><div id="life-fill"></div></div>
    </div>

    <div id="overlay">
        <h1 id="main-title">GALAXY LASER WAR</h1>
        <p>REVIDE OS ATAQUES INIMIGOS!</p>
        <p style="color: #00ff00; font-size: 14px;">Mouse: Move | Clique ou Espaço: Atira | Enter: Inicia</p>
        <button id="btn-start">JOGAR</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreTxt = document.getElementById('score-display');
        const lifeFill = document.getElementById('life-fill');
        const overlay = document.getElementById('overlay');
        const btnStart = document.getElementById('btn-start');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let gameActive = false;
        let score = 0;
        let loopId = null;
        let spawnTimeout = null;
        let enemyShootInterval = null;

        const player = { x: canvas.width/2, y: canvas.height/2, r: 20, hp: 100 };
        let playerShots = [];
        let enemyShots = [];
        let enemies = [];
        let particles = [];
        const stars = [];

        // Inicializa estrelas de fundo
        for(let i=0; i<80; i++) {
            stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2});
        }

        // Movimento do jogador
        window.addEventListener('mousemove', e => {
            player.x = e.clientX;
            player.y = e.clientY;
        });

        // Mecânica de tiro do jogador
        function playerFire() {
            if(gameActive) playerShots.push({x: player.x, y: player.y - 30});
        }

        window.addEventListener('mousedown', () => { if(gameActive) playerFire(); });
        
        window.addEventListener('keydown', e => {
            if(e.code === 'Space') {
                e.preventDefault();
                playerFire();
            }
            if(e.code === 'Enter' && !gameActive) {
                initGame();
            }
        });

        // Ativação do Botão Blindada por JS
        btnStart.addEventListener('click', (e) => {
            e.stopPropagation();
            initGame();
        });

        function initGame() {
            if (gameActive) return;
            
            cancelAnimationFrame(loopId);
            clearTimeout(spawnTimeout);
            clearInterval(enemyShootInterval);
            
            gameActive = true;
            overlay.style.display = 'none';
            score = 0;
            player.hp = 100;
            enemies = [];
            playerShots = [];
            enemyShots = [];
            particles = [];
            scoreTxt.innerText = "SCORE: 0";
            lifeFill.style.width = "100%";
            lifeFill.style.background = "#00ff00";
            
            update();
            spawn();
            
            // Faz os inimigos vivos atirarem a cada 1.2 segundos
            enemyShootInterval = setInterval(() => {
                if(!gameActive) return;
                enemies.forEach(en => {
                    if(en.y > 0 && en.y < canvas.height) {
                        enemyShots.push({x: en.x, y: en.y + en.r, speed: 7});
                    }
                });
            }, 1200);
        }

        function spawn() {
            if(!gameActive) return;
            enemies.push({
                x: Math.random() * canvas.width,
                y: -50,
                r: 22,
                speed: 2 + (score/2000)
            });
            spawnTimeout = setTimeout(spawn, Math.max(300, 1200 - (score/8)));
        }

        function explode(x, y, color) {
            for(let i=0; i<8; i++) {
                particles.push({
                    x, y, 
                    vx: (Math.random()-0.5)*10, 
                    vy: (Math.random()-0.5)*10, 
                    a: 1,
                    c: color
                });
            }
        }

        function update() {
            if(!gameActive) return;

            ctx.fillStyle = '#020205';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Estrelas
            ctx.fillStyle = 'white';
            stars.forEach(s => {
                s.y += 1; if(s.y > canvas.height) s.y = 0;
                ctx.fillRect(s.x, s.y, s.s, s.s);
            });

            // Tiros do Jogador (Verdes)
            playerShots.forEach((sh, i) => {
                sh.y -= 14;
                ctx.fillStyle = '#00ff00';
                ctx.fillRect(sh.x-2, sh.y, 4, 20);
                if(sh.y < -20) playerShots.splice(i, 1);
            });

            // Tiros dos Inimigos (Amarelos)
            enemyShots.forEach((esh, i) => {
                esh.y += esh.speed;
                ctx.fillStyle = '#ffff00';
                ctx.fillRect(esh.x-2, esh.y, 4, 15);

                // Tiro inimigo acertou o jogador
                if(Math.hypot(esh.x - player.x, esh.y - player.y) < player.r) {
                    enemyShots.splice(i, 1);
                    player.hp -= 15;
                    explode(player.x, player.y, '#ff0055');
                    if(player.hp <= 0) gameOver();
                }

                if(esh.y > canvas.height + 20) enemyShots.splice(i, 1);
            });

            // Inimigos e Colisões de Impacto
            enemies.forEach((en, i) => {
                en.y += en.speed;
                
                // Desenha nave inimiga (Triângulo Vermelho)
                ctx.fillStyle = '#ff3333';
                ctx.beginPath();
                ctx.moveTo(en.x, en.y + en.r);
                ctx.lineTo(en.x - en.r, en.y - en.r);
                ctx.lineTo(en.x + en.r, en.y - en.r);
                ctx.fill();

                // Seu tiro acertou o inimigo
                playerShots.forEach((sh, si) => {
                    if(Math.hypot(sh.x - en.x, sh.y - en.y) < en.r) {
                        explode(en.x, en.y, '#ff5500');
                        enemies.splice(i, 1);
                        playerShots.splice(si, 1);
                        score += 100;
                        scoreTxt.innerText = "SCORE: " + score;
                    }
                });

                // Colisão direta de naves
                if(Math.hypot(player.x - en.x, player.y - en.y) < player.r + en.r) {
                    player.hp -= 35;
                    explode(en.x, en.y, '#ff0000');
                    enemies.splice(i, 1);
                    if(player.hp <= 0) gameOver();
                }

                if(en.y > canvas.height + 50) enemies.splice(i, 1);
            });

            // Atualiza barra de vida na UI
            lifeFill.style.width = player.hp + "%";
            if(player.hp < 40) lifeFill.style.background = "#ff0000";

            // Partículas
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.a -= 0.03;
                ctx.fillStyle = p.c;
                ctx.globalAlpha = p.a;
                ctx.fillRect(p.x, p.y, 3, 3);
                ctx.globalAlpha = 1;
                if(p.a <= 0) particles.splice(i, 1);
            });

            drawRocket(player.x, player.y);
            loopId = requestAnimationFrame(update);
        }

        function drawRocket(x, y) {
            ctx.fillStyle = '#ff0055'; // Asas
            ctx.fillRect(x-20, y, 8, 15); ctx.fillRect(x+12, y, 8, 15);
            ctx.fillStyle = '#ffffff'; // Corpo
            ctx.beginPath(); ctx.moveTo(x, y-30); ctx.lineTo(x+12, y+10); ctx.lineTo(x-12, y+10); ctx.fill();
            ctx.fillStyle = '#ffaa00'; // Fogo
            if(Math.random()>0.4) ctx.fillRect(x-4, y+10, 8, 12);
        }

        function gameOver() {
            gameActive = false;
            clearInterval(enemyShootInterval);
            overlay.style.display = 'flex';
            document.getElementById('main-title').innerText = "CONFRONTO ENCERRADO";
            document.getElementById('main-title').style.color = "#ff0055";
            btnStart.innerText = "RECOMANÇAR REVOLUÇÃO";
        }

        window.onresize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };
    </script>
</body>
</html>
