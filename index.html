<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Racing Realist - 2 Players & Obstacles</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #111;
            font-family: 'Arial Black', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 100px rgba(0,0,0,1);
            border: 6px solid #333;
            background: #222;
        }

        #ui {
            position: absolute;
            top: 15px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            color: #fff;
            z-index: 10;
            pointer-events: none;
        }

        .stats {
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid #555;
        }

        #msg-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            background: rgba(0,0,0,0.9);
            padding: 40px;
            border-radius: 20px;
            border: 3px solid #ff3300;
            z-index: 20;
        }

        canvas { display: block; }
        span { color: #00ff00; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui">
            <div class="stats">LEVEL: <span id="level">1</span></div>
            <div class="stats">P1: <span id="p1-score">0</span>m</div>
            <div class="stats">P2: <span id="p2-score">0</span>m</div>
        </div>
        
        <canvas id="gameCanvas"></canvas>

        <div id="msg-overlay" id="start-screen">
            <h1>RACING TURBO</h1>
            <p>P1: W,A,S,D | P2: SETAS</p>
            <p style="color: #ffcc00">CUIDADO COM OS OBSTÁCULOS!</p>
            <button onclick="startGame()" style="padding: 15px 30px; cursor: pointer; font-weight: bold;">LARGADA!</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const msgOverlay = document.getElementById('msg-overlay');

        canvas.width = 700;
        canvas.height = window.innerHeight * 0.95;

        let gameActive = false;
        let level = 1;
        let roadOffset = 0;
        let speed = 7;
        let obstacles = [];
        const keys = {};

        // Imagens
        const car1Img = new Image(); car1Img.src = 'https://i.imgur.com/vH0HhU9.png';
        const car2Img = new Image(); car2Img.src = 'https://i.imgur.com/Bf0NnO5.png';

        const p1 = { x: 120, y: canvas.height - 200, w: 85, h: 150, score: 0, tilt: 0 };
        const p2 = { x: 480, y: canvas.height - 200, w: 85, h: 150, score: 0, tilt: 0 };

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function startGame() {
            gameActive = true;
            msgOverlay.style.display = 'none';
            spawnObstacle();
            update();
        }

        function spawnObstacle() {
            if (!gameActive) return;
            const lane = Math.random() > 0.5 ? 80 : 420;
            obstacles.push({
                x: lane + Math.random() * 150,
                y: -100,
                w: 50,
                h: 50,
                type: Math.random() > 0.5 ? 'cone' : 'block'
            });
            setTimeout(spawnObstacle, 2000 / (level * 0.5));
        }

        function update() {
            if (!gameActive) return;

            // Movimento P1
            p1.tilt = 0;
            if (keys['KeyW'] && p1.y > 50) p1.y -= 6;
            if (keys['KeyS'] && p1.y < canvas.height - 160) p1.y += 6;
            if (keys['KeyA'] && p1.x > 50) { p1.x -= 8; p1.tilt = -0.05; }
            if (keys['KeyD'] && p1.x < canvas.width/2 - 100) { p1.x += 8; p1.tilt = 0.05; }

            // Movimento P2
            p2.tilt = 0;
            if (keys['ArrowUp'] && p2.y > 50) p2.y -= 6;
            if (keys['ArrowDown'] && p2.y < canvas.height - 160) p2.y += 6;
            if (keys['ArrowLeft'] && p2.x > canvas.width/2 + 20) { p2.x -= 8; p2.tilt = -0.05; }
            if (keys['ArrowRight'] && p2.x < canvas.width - 130) { p2.x += 8; p2.tilt = 0.05; }

            // Obstáculos e Colisão
            obstacles.forEach((obs, index) => {
                obs.y += speed;
                
                // Colisão P1
                if (checkCollision(p1, obs)) {
                    p1.score = Math.max(0, p1.score - 5);
                    obstacles.splice(index, 1);
                }
                // Colisão P2
                if (checkCollision(p2, obs)) {
                    p2.score = Math.max(0, p2.score - 5);
                    obstacles.splice(index, 1);
                }

                if (obs.y > canvas.height) obstacles.splice(index, 1);
            });

            p1.score += speed / 15;
            p2.score += speed / 15;

            // Níveis
            if (Math.max(p1.score, p2.score) > level * 1500 && level < 5) {
                level++;
                speed += 3;
                document.getElementById('level').innerText = level;
            }

            roadOffset += speed;
            draw();
            requestAnimationFrame(update);
        }

        function checkCollision(car, obs) {
            return car.x < obs.x + obs.w && car.x + car.w > obs.x &&
                   car.y < obs.y + obs.h && car.y + car.h > obs.y;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Grama e Estrada
            ctx.fillStyle = "#1a5e1a";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#333";
            ctx.fillRect(40, 0, canvas.width - 80, canvas.height);

            // Linhas
            ctx.strokeStyle = "#fff";
            ctx.setLineDash([40, 40]);
            ctx.lineDashOffset = -roadOffset;
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(canvas.width/2, 0); ctx.lineTo(canvas.width/2, canvas.height);
            ctx.stroke();

            // Obstáculos
            obstacles.forEach(obs => {
                ctx.fillStyle = obs.type === 'cone' ? '#ff6600' : '#888';
                ctx.shadowBlur = 10;
                ctx.shadowColor = "black";
                ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                ctx.shadowBlur = 0;
            });

            // Desenhar Carros Melhorados
            drawCar(car1Img, p1);
            drawCar(car2Img, p2);

            document.getElementById('p1-score').innerText = Math.floor(p1.score);
            document.getElementById('p2-score').innerText = Math.floor(p2.score);
        }

        function drawCar(img, car) {
            ctx.save();
            ctx.translate(car.x + car.w/2, car.y + car.h/2);
            ctx.rotate(car.tilt);
            
            // Sombra projetada
            ctx.shadowBlur = 15;
            ctx.shadowColor = "rgba(0,0,0,0.5)";
            ctx.shadowOffsetY = 10;
            
            ctx.drawImage(img, -car.w/2, -car.h/2, car.w, car.h);
            ctx.restore();
        }
    </script>
</body>
</html>
