<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Rocket Galaxy Survival</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #020205;
            font-family: 'Arial Black', sans-serif;
            color: white;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            pointer-events: none;
        }

        #score-display { font-size: 30px; color: #ffcc00; text-shadow: 2px 2px #000; }

        #overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(20,20,50,0.8) 0%, rgba(0,0,0,0.95) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        h1 { font-size: 60px; margin: 0; color: #00d4ff; text-shadow: 0 0 20px #00d4ff; }

        button {
            padding: 20px 60px;
            font-size: 25px;
            background: #ff0055;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.5);
            transition: 0.3s;
            margin-top: 30px;
        }

        button:hover { transform: scale(1.1); background: #ff2b73; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="score-display">SCORE: 0</div>
    </div>

    <div id="overlay">
        <h1 id="main-title">GALAXY ROCKET</h1>
        <p>Use o Mouse para pilotar o Foguete</p>
        <button id="start-btn">DECOLAR!</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('start-btn');
        const scoreTxt = document.getElementById('score-display');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let gameActive = false;
        let score = 0;
        const player = { x: canvas.width / 2, y: canvas.height / 2, r: 25 };
        const enemies = [];
        const stars = [];

        // Criar estrelas para o fundo da galáxia
        for(let i=0; i<150; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                speed: Math.random() * 3 + 1
            });
        }

        window.addEventListener('mousemove', (e) => {
            player.x = e.clientX;
            player.y = e.clientY;
        });

        startBtn.addEventListener('click', () => {
            gameActive = true;
            overlay.style.display = 'none';
            score = 0;
            enemies.length = 0;
            animate();
            spawnEnemies();
        });

        function spawnEnemies() {
            if(!gameActive) return;
            const size = Math.random() * 30 + 20;
            enemies.push({
                x: Math.random() * canvas.width,
                y: -50,
                r: size,
                speed: Math.random() * 4 + 2 + (score/1000)
            });
            setTimeout(spawnEnemies, 1000 - (Math.min(score/10, 600)));
        }

        function drawRocket(x, y) {
            ctx.save();
            ctx.translate(x, y);
            
            // Fogo do motor (animado)
            ctx.fillStyle = Math.random() > 0.5 ? '#ffaa00' : '#ff4400';
            ctx.beginPath();
            ctx.moveTo(-10, 25);
            ctx.lineTo(0, 45 + Math.random()*10);
            ctx.lineTo(10, 25);
            ctx.fill();

            // Corpo do Foguete
            ctx.fillStyle = '#eee';
            ctx.beginPath();
            ctx.moveTo(0, -35); // Bico
            ctx.bezierCurveTo(20, -10, 20, 20, 15, 30); // Lado direito
            ctx.lineTo(-15, 30); // Base
            ctx.bezierCurveTo(-20, 20, -20, -10, 0, -35); // Lado esquerdo
            ctx.fill();

            // Janela
            ctx.fillStyle = '#33ccff';
            ctx.beginPath();
            ctx.arc(0, -5, 7, 0, Math.PI*2);
            ctx.fill();

            // Asas
            ctx.fillStyle = '#ff0055';
            ctx.fillRect(-22, 15, 10, 15);
            ctx.fillRect(12, 15, 10, 15);
            
            ctx.restore();
        }

        function animate() {
            if(!gameActive) return;
            
            // Fundo Espacial
            ctx.fillStyle = '#020205';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Desenhar Estrelas (Movimento de Galáxia)
            ctx.fillStyle = "white";
            stars.forEach(s => {
                s.y += s.speed;
                if(s.y > canvas.height) s.y = 0;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
                ctx.fill();
            });

            // Inimigos (Meteoros)
            enemies.forEach((en, i) => {
                en.y += en.speed;
                ctx.fillStyle = '#554433';
                ctx.beginPath();
                ctx.arc(en.x, en.y, en.r, 0, Math.PI*2);
                ctx.fill();
                
                // Colisão simples
                const dist = Math.hypot(player.x - en.x, player.y - en.y);
                if(dist < player.r + en.r) {
                    gameOver();
                }

                if(en.y > canvas.height + 100) {
                    enemies.splice(i, 1);
                    score += 10;
                    scoreTxt.innerText = "SCORE: " + score;
                }
            });

            drawRocket(player.x, player.y);
            requestAnimationFrame(animate);
        }

        function gameOver() {
            gameActive = false;
            overlay.style.display = 'flex';
            document.getElementById('main-title').innerText = "MISSÃO FALHOU!";
            document.getElementById('main-title').style.color = "#ff0055";
            startBtn.innerText = "TENTAR NOVAMENTE";
        }
    </script>
</body>
</html>
