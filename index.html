<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racing Masters - Versão Estável</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            position: relative;
            border: 5px solid #333;
            background: #222;
            line-height: 0;
        }

        #ui {
            position: absolute;
            top: 10px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            color: #fff;
            z-index: 10;
            pointer-events: none;
            font-weight: bold;
            text-shadow: 2px 2px #000;
        }

        #msg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
            text-align: center;
        }

        button {
            padding: 20px 50px;
            font-size: 24px;
            background: #ff0000;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            transition: transform 0.2s;
        }

        button:hover { transform: scale(1.1); background: #cc0000; }
        
        canvas { display: block; }
        .score-val { color: #ff0; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui">
            <div>FASE: <span id="level-txt">1</span>/5</div>
            <div>P1: <span id="p1-txt" class="score-val">0</span>m</div>
            <div>P2: <span id="p2-txt" class="score-val">0</span>m</div>
        </div>
        
        <div id="msg-overlay">
            <h1>RACING MASTERS</h1>
            <p>P1: [W, A, S, D] | P2: [SETAS]</p>
            <button id="btn-start">INICIAR CORRIDA</button>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        // Configurações e Elementos
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('msg-overlay');
        const btn = document.getElementById('btn-start');

        canvas.width = 800;
        canvas.height = window.innerHeight * 0.9;

        let gameActive = false;
        let level = 1;
        let roadOffset = 0;
        let speed = 8;
        const keys = {};

        // Carros
        const p1 = { x: 150, y: canvas.height - 250, w: 90, h: 170, score: 0, color: 'red' };
        const p2 = { x: 550, y: canvas.height - 250, w: 90, h: 170, score: 0, color: 'blue' };

        // Carregar imagens com garantia de erro
        const car1Img = new Image(); car1Img.src = 'https://i.imgur.com/vH0HhU9.png';
        const car2Img = new Image(); car2Img.src = 'https://i.imgur.com/Bf0NnO5.png';

        // Escuta de teclado
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        // Função de Início (Vinculada via addEventListener para ser mais segura)
        btn.addEventListener('click', () => {
            if (!gameActive) {
                gameActive = true;
                overlay.style.display = 'none';
                loop();
            }
        });

        function loop() {
            if (!gameActive) return;
            update();
            draw();
            requestAnimationFrame(loop);
        }

        function update() {
            let mSpeed = 7 + level;

            // Movimento P1
            if (keys['KeyW'] && p1.y > 0) p1.y -= mSpeed;
            if (keys['KeyS'] && p1.y < canvas.height - p1.h) p1.y += mSpeed;
            if (keys['KeyA'] && p1.x > 60) p1.x -= mSpeed;
            if (keys['KeyD'] && p1.x < canvas.width/2 - 100) p1.x += mSpeed;

            // Movimento P2
            if (keys['ArrowUp'] && p2.y > 0) p2.y -= mSpeed;
            if (keys['ArrowDown'] && p2.y < canvas.height - p2.h) p2.y += mSpeed;
            if (keys['ArrowLeft'] && p2.x > canvas.width/2 + 10) p2.x -= mSpeed;
            if (keys['ArrowRight'] && p2.x < canvas.width - 150) p2.x += mSpeed;

            p1.score += speed / 20;
            p2.score += speed / 20;

            // Níveis
            let maxScore = Math.max(p1.score, p2.score);
            if (maxScore > level * 2000 && level < 5) {
                level++;
                speed += 4;
                document.getElementById('level-txt').innerText = level;
            }

            roadOffset += speed;
            
            document.getElementById('p1-txt').innerText = Math.floor(p1.score);
            document.getElementById('p2-txt').innerText = Math.floor(p2.score);
        }

        function draw() {
            // Fundo/Pista
            ctx.fillStyle = "#1a5e1a"; // Grama
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#333"; // Asfalto
            ctx.fillRect(50, 0, canvas.width - 100, canvas.height);

            // Linha central animada
            ctx.strokeStyle = "#fff";
            ctx.setLineDash([40, 40]);
            ctx.lineDashOffset = -roadOffset;
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();

            // Desenhar Carros
            drawPlayer(p1, car1Img);
            drawPlayer(p2, car2Img);
        }

        function drawPlayer(p, img) {
            ctx.shadowBlur = 15;
            ctx.shadowColor = "black";
            
            // Tenta desenhar imagem, se falhar desenha retângulo
            try {
                if (img.complete && img.naturalWidth !== 0) {
                    ctx.drawImage(img, p.x, p.y, p.w, p.h);
                } else {
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, p.w, p.h);
                }
            } catch (e) {
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.w, p.h);
            }
            ctx.shadowBlur = 0;
        }

        // Desenhar estado inicial parado
        window.onload = draw;
    </script>
</body>
</html>
