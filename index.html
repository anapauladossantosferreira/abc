<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Interstellar War - O Retorno do OVNI</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #020205; 
            font-family: 'Arial Black', sans-serif; 
            color: white; 
            user-select: none;
        }
        #ui { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            z-index: 10; 
            pointer-events: none; 
        }
        .hud { 
            font-size: 24px; 
            color: #ffcc00; 
            text-shadow: 2px 2px #000;
            margin-bottom: 5px;
        }
        #planet-name { color: #00d4ff; }
        #life-bar {
            width: 200px; height: 15px;
            background: #550000; border: 2px solid #fff;
            border-radius: 10px; overflow: hidden;
        }
        #life-fill {
            width: 100%; height: 100%;
            background: #00ff00; transition: width 0.1s;
        }
        #overlay {
            position: absolute; width: 100%; height: 100%;
            background: rgba(2, 2, 5, 0.9);
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 100;
        }
        h1 {
            font-size: 45px; color: #00d4ff; text-align: center;
            margin: 10px; text-shadow: 0 0 15px #00d4ff;
        }
        button {
            padding: 20px 60px; font-size: 25px; 
            background: #ff0055; color: white; border: none;
            border-radius: 50px; cursor: pointer; font-weight: bold; 
            margin-top: 20px; box-shadow: 0 0 20px #ff0055;
        }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="phase-display" class="hud">FASE: <span id="current-phase">1</span>/8</div>
        <div id="target-display" class="hud">ALVO: <span id="planet-name">Mercúrio</span></div>
        <div id="score-display" class="hud">SCORE: 0 / 20000</div>
        <div class="hud">VIDA:</div>
        <div id="life-bar"><div id="life-fill"></div></div>
    </div>

    <div id="overlay">
        <h1 id="main-title">GALAXY WAR: 8 PLANETAS</h1>
        <p id="main-desc">Vença Netuno para desbloquear o segredo dos visitantes!</p>
        <button id="btn-start">INICIAR MISSÃO</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>

            if (gameActive && !phaseTransition && !finaleCinematic) {
                player.x = e.clientX; player.y = e.clientY;
            }
        });

        const fire = () => { if(gameActive && !phaseTransition && !finaleCinematic) playerShots.push({x: player.x, y: player.y - 30}); };
