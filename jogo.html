<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Deep Space Survival</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
        }

        .stat { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        #score { color: #00d4ff; }

        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border: 2px solid #ff0055;
            display: none;
        }

        button {
            padding: 10px 30px;
            font-size: 18px;
            background: #ff0055;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div class="stat">SCORE: <span id="score">0</span></div>
    </div>

    <div id="game-over">
        <h1>NAVE DESTRUÍDA!</h1>
        <p>Pontuação Final: <span id="final-score">0</span></p>
        <button onclick="resetGame()">REINICIAR</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const gameOverScreen = document.getElementById('game-over');
        const finalScoreElement = document.getElementById('final-score');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let gameActive = true;
        const player = { x: canvas.width / 2, y: canvas.height - 100, radius: 20 };
        const projectiles = [];
        const enemies = [];
        const particles = [];

        // Mouse Move
        window.addEventListener('mousemove', (e) => {
            player.x = e.clientX;
            player.y = e.clientY;
        });

        function spawnEnemy() {
            if (!gameActive) return;
            const radius = Math.random() * (40 - 15) + 15;
            const x = Math.random() * canvas.width;
            const y = -radius;
            const speed = Math.random() * (4 - 1) + 1 + (score / 1000);
            enemies.push({ x, y, radius, speed, color: `hsl(${Math.random() * 360}, 50%, 50%)` });
            setTimeout(spawnEnemy, 800 - (score / 50 > 500 ? 500 : score / 50));
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    radius: Math.random() * 3,
                    alpha: 1,
                    color
                });
            }
        }

        function resetGame() {
            score = 0;
            projectiles.length = 0;
            enemies.length = 0;
            particles.length = 0;
            gameActive = true;
            gameOverScreen.style.display = 'none';
            scoreElement.innerText = '0';
            spawnEnemy();
            animate();
        }

        // Auto Shoot
        setInterval(() => {
            if (gameActive) {
                projectiles.push({ x: player.x, y: player.y - 20, speed: 10 });
            }
        }, 150);

        function animate() {
            if (!gameActive) return;
            ctx.fillStyle = 'rgba(5, 5, 5, 0.3)'; // Efeito de rastro
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Player - Brilho Neon
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#00d4ff';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00d4ff';
            ctx.fill();
            ctx.shadowBlur = 0;

            // Projetéis
            projectiles.forEach((p, i) => {
                p.y -= p.speed;
                ctx.fillStyle = '#fff';
                ctx.fillRect(p.x - 2, p.y, 4, 15);
                if (p.y < 0) projectiles.splice(i, 1);
            });

            // Inimigos
            enemies.forEach((en, i) => {
                en.y += en.speed;
                ctx.beginPath();
                ctx.arc(en.x, en.y, en.radius, 0, Math.PI * 2);
                ctx.fillStyle = en.color;
                ctx.fill();

                // Colisão com Player
                const dist = Math.hypot(player.x - en.x, player.y - en.y);
                if (dist < player.radius + en.radius) {
                    gameActive = false;
                    gameOverScreen.style.display = 'block';
                    finalScoreElement.innerText = score;
                }

                // Colisão com Projetil
                projectiles.forEach((p, pi) => {
                    const distProj = Math.hypot(p.x - en.x, p.y - en.y);
                    if (distProj < en.radius) {
                        createParticles(en.x, en.y, en.color);
                        score += 10;
                        scoreElement.innerText = score;
                        enemies.splice(i, 1);
                        projectiles.splice(pi, 1);
                    }
                });

                if (en.y > canvas.height + en.radius) enemies.splice(i, 1);
            });

            // Partículas de Explosão
            particles.forEach((part, i) => {
                part.x += part.vx;
                part.y += part.vy;
                part.alpha -= 0.02;
                ctx.globalAlpha = part.alpha;
                ctx.beginPath();
                ctx.arc(part.x, part.y, part.radius, 0, Math.PI * 2);
                ctx.fillStyle = part.color;
                ctx.fill();
                ctx.globalAlpha = 1;
                if (part.alpha <= 0) particles.splice(i, 1);
            });

            requestAnimationFrame(animate);
        }

        window.onload = () => {
            spawnEnemy();
            animate();
        };

        window.onresize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };
    </script>
</body>
</html>
